<!doctype html>
<html lang="en">
<head>
  <title>500 – Something Went Wrong | World Census</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    body {
      background: #020B18;
      color: #ffffff;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #FF204E, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; margin: 0.5rem 0 1rem; }
    p { color: rgba(255,255,255,0.6); max-width: 420px; line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: #FF204E;
      color: #fff;
      text-decoration: none;
      padding: 0.65rem 1.75rem;
      border-radius: 8px;
      font-weight: 600;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <main>
    <div class="code">500</div>
    <h1>Something Went Wrong</h1>
    <p>We're experiencing an unexpected issue. Our team has been notified — please try again in a moment.</p>
    <a href="/">Back to Home</a>
  </main>
</body>
</html>
